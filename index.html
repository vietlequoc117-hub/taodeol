          return;
        }

        try {
          const docRef = window.doc(window.db, "exams", examId);
          const docSnap = await window.getDoc(docRef);
          if (docSnap.exists()) {
            state.examId = examId;
            state.examData = JSON.parse(docSnap.data().data);
            setScreen('login');
          } else {

      async function fetchAdminExams() {
        try {
          // Remove orderBy to avoid index requirement if not created yet
          const q = query(collection(db, "exams"), where("adminId", "==", state.user.uid));
          const snapshot = await getDocs(q);
          state.adminExams = [];
          snapshot.forEach(doc => {
            state.adminExams.push({ id: doc.id, ...doc.data() });
          });
          
          // Sort manually in memory to ensure latest is first without needing Firestore index
          state.adminExams.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          
          setScreen("admin_dashboard");
        } catch (error) {
          console.error(error);
          showAlert("Lỗi tải danh sách đề thi: " + error.message);
        }
      }

      async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const examType = document.getElementById("examTypeSelect").value;

        // Show loading
        const loadingModal = document.createElement("div");
        loadingModal.id = "loading-modal";
        loadingModal.className = "fixed inset-0 bg-black/50 flex items-center justify-center z-[1000]";
        loadingModal.innerHTML = `
          <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm mx-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Đang xử lý đề thi...</h3>
            <p class="text-gray-600">AI đang phân tích nội dung file DOCX của bạn. Quá trình này có thể mất 10-20 giây.</p>
          </div>
        `;
        document.body.appendChild(loadingModal);

        const reader = new FileReader();
        reader.onload = async function (e) {
          const arrayBuffer = e.target.result;
          try {
            const result = await mammoth.convertToHtml(
              { arrayBuffer: arrayBuffer },
              {
                styleMap: ["u => u", "b => strong", "i => em", "strike => s"],
              },
            );
            const html = result.value;
            
            // Use Gemini to parse the exam
            const newExamData = await parseExamWithGemini(html, examType);
            newExamData.examType = examType;

            // Cập nhật dữ liệu đề thi
            state.examData = newExamData;

            // Reset state
            state.answers = { part1: {}, part2: {}, part3: {} };
            state.score = 0;
            state.results = null;

            // Save exam to Firestore
            await saveExamToFirestore(newExamData, file.name, examType);
          } catch (err) {
            console.error(err);
            showAlert("Lỗi khi xử lý đề thi: " + err.message);
          } finally {
            const modal = document.getElementById("loading-modal");
            if (modal) modal.remove();
          }
        };
        reader.readAsArrayBuffer(file);
      }

      async function parseExamWithGemini(html, examType) {
        const prompt = `Bạn là một chuyên gia giáo dục và chuyên gia trích xuất dữ liệu. Hãy phân tích nội dung HTML trích xuất từ file DOCX đề thi và chuyển đổi nó thành định dạng JSON chính xác.

Đề thi có 3 phần chính:
Phần I: Câu hỏi trắc nghiệm 4 lựa chọn (A, B, C, D). Chỉ có 1 đáp án đúng.
Phần II: Câu hỏi trắc nghiệm Đúng/Sai. Mỗi câu hỏi lớn có nhiều ý nhỏ (thường là a, b, c, d). Mỗi ý nhỏ phải được xác định là Đúng (true) hoặc Sai (false).
QUY TẮC NHẬN DIỆN ĐÁP ÁN PHẦN II: 
- Nếu một ý nhỏ (a, b, c, d) được gạch chân (<u>...</u>), đó là ý ĐÚNG (true).
- Nếu ý nhỏ KHÔNG được gạch chân, đó là ý SAI (false).
- Nếu không có gạch chân nào, hãy dùng kiến thức chuyên môn để xác định.

Phần III: Câu hỏi trả lời ngắn. Đáp án là một chuỗi văn bản hoặc số.

YÊU CẦU CỰC KỲ QUAN TRỌNG:
1. Trích xuất TOÀN BỘ các câu hỏi có trong tài liệu. KHÔNG ĐƯỢC TÓM TẮT, KHÔNG ĐƯỢC BỎ SÓT bất kỳ câu nào. Nếu đề thi có 40 câu, bạn phải trả về đủ 40 câu.
2. Nhận diện đáp án đúng: Đáp án thường được gạch chân (<u>), in đậm (<strong>), tô màu đỏ, hoặc có ký hiệu đặc biệt. Ưu tiên gạch chân cho Phần II.
3. Nếu không thấy đáp án được đánh dấu, hãy sử dụng kiến thức chuyên môn để giải và đưa ra đáp án chính xác nhất.
4. Đối với Phần II: Đảm bảo trích xuất đầy đủ tất cả các ý nhỏ (a, b, c, d...) cho mỗi câu hỏi lớn.
5. Giữ nguyên định dạng văn bản quan trọng, công thức, hoặc mã nguồn (code) trong nội dung câu hỏi. 
   - PHẢI sử dụng ký tự xuống dòng (\n) để tách biệt các dòng code. TUYỆT ĐỐI KHÔNG được gộp các dòng code lại với nhau thành một dòng.
   - PHẢI giữ nguyên các khoảng trắng thụt lề (indentation) ở đầu dòng để code (như Python) có cấu trúc đúng.
   - Luôn chèn ít nhất một ký tự xuống dòng (\n) giữa phần câu hỏi dẫn và phần mã nguồn.
6. Loại bỏ các phần tiêu đề hành chính (Tên trường, tên lớp, kỳ thi, lời dặn...) ở đầu trang.
7. Đảm bảo các ID câu hỏi là số thứ tự tăng dần (1, 2, 3...).
8. Nếu đề thi KHÔNG CÓ đủ 3 phần (ví dụ chỉ có bài tập tự luận/code), hãy đưa tất cả vào "part3" (trả lời ngắn/tự luận) và để part1, part2 là mảng rỗng [].
9. Nếu đề thi dùng từ "Bài 1", "Bài 2" thay vì "Câu 1", hãy coi đó là các câu hỏi.

Nội dung HTML cần phân tích:
${html}`;

        try {
          if (!ai) {
            console.warn("AI is not initialized (missing API Key). Falling back to manual parser.");
            showAlert("Chưa cấu hình API Key trên Vercel. Đang sử dụng bộ phân tích cơ bản (có thể không chính xác bằng AI).");
            return parseExamHTML(html);
          }

          const response = await ai.models.generateContent({
            model: "gemini-2.5-flash",
            contents: prompt,
            config: {
              responseMimeType: "application/json",
              responseSchema: {
                type: Type.OBJECT,
                properties: {
                  part1: {
                    type: Type.ARRAY,
                    items: {
                      type: Type.OBJECT,
                      properties: {
                        id: { type: Type.NUMBER },
                        question: { type: Type.STRING },
                        options: { type: Type.ARRAY, items: { type: Type.STRING } },
                        answer: { type: Type.NUMBER }
                      },
                      required: ["id", "question", "options", "answer"]
                    }
                  },
                  part2: {
                    type: Type.ARRAY,
                    items: {
                      type: Type.OBJECT,
                      properties: {
                        id: { type: Type.NUMBER },
                        question: { type: Type.STRING },
                        subQuestions: { 
                          type: Type.ARRAY, 
                          items: { 
                            type: Type.OBJECT,
                            properties: {
                              id: { type: Type.STRING },
                              text: { type: Type.STRING },
                              answer: { type: Type.BOOLEAN, description: "True if the sub-question is underlined in HTML, False otherwise." }
                            },
                            required: ["id", "text", "answer"]
                          } 
                        }
                      },
                      required: ["id", "question", "subQuestions"]
                    }
                  },
                  part3: {
                    type: Type.ARRAY,
                    items: {
                      type: Type.OBJECT,
                      properties: {
                        id: { type: Type.NUMBER },
                        question: { type: Type.STRING },
                        answer: { type: Type.STRING }
                      },
                      required: ["id", "question", "answer"]
                    }
                  }
                },
                required: ["part1", "part2", "part3"]
              }
            }
          });

          const parsedData = JSON.parse(response.text);
          
          // Ensure all parts exist as arrays
          if (!parsedData.part1) parsedData.part1 = [];
          if (!parsedData.part2) parsedData.part2 = [];
          if (!parsedData.part3) parsedData.part3 = [];
          
          return parsedData;
        } catch (error) {
          console.error("Gemini Error:", error);
          showAlert("Lỗi khi dùng AI phân tích đề thi: " + error.message + "\n\nĐang chuyển sang chế độ phân tích cơ bản (có thể không chính xác).");
          // Fallback to manual parser if Gemini fails
          return parseExamHTML(html);
        }
      }

      async function saveExamToFirestore(examData, fileName, examType) {
        if (!state.isAdmin) {
          showAlert("Bạn không có quyền tải lên đề thi.");
          return;
        }
        
        try {
          const docRef = await addDoc(collection(db, "exams"), {
            title: fileName.replace(/\.[^/.]+$/, ""), // Remove extension
            data: JSON.stringify(examData),
            adminId: state.user.uid,
            createdAt: new Date().toISOString(),
            examType: examType
          });
          
          showAlert(`Đã tải lên và xử lý file: ${fileName}\n\nĐề thi đã được lưu thành công! ID đề thi: ${docRef.id}`, () => {
            fetchAdminExams();
          });
        } catch (error) {
          console.error("Error adding document: ", error);
          showAlert("Lỗi khi lưu đề thi: " + error.message);
        }
      }

      function parseExamHTML(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        let newExamData = {
          part1: [],
          part2: [],
          part3: [],
        };

        let blocks = [];
        const elements = doc.body.querySelectorAll(
          "p, h1, h2, h3, h4, h5, h6, li, td",
        );
        elements.forEach((el) => {
          const hasBlockChild = Array.from(el.children).some((child) =>
            [
              "P",
              "H1",
              "H2",
              "H3",
              "H4",
              "H5",
              "H6",
              "LI",
              "TD",
              "DIV",
              "TABLE",
              "TR",
              "TBODY",
            ].includes(child.tagName),
          );
          if (hasBlockChild) return;

          const htmlParts = el.innerHTML.split(/<br\s*\/?>/i);
          htmlParts.forEach((part) => {
            const temp = document.createElement("div");
            // Replace tabs with 4 spaces to preserve indentation
            temp.innerHTML = part.replace(/\t/g, '    ');
            // Use textContent to get the text, preserving spaces
            let text = temp.textContent.trimEnd();
            
            if (text.trim()) {
              blocks.push({ text: text, element: temp });
            }
          });
        });

        let currentPart = 1;
        let currentQuestion = null;

        for (let i = 0; i < blocks.length; i++) {
          let text = blocks[i].text;
          let el = blocks[i].element;

          // Nhận diện các phần
          const lowerText = text.toLowerCase();
          if (lowerText.includes("phần iii") || lowerText.includes("phần 3")) {
            currentPart = 3;
            continue;
          } else if (
            lowerText.includes("phần ii") ||
            lowerText.includes("phần 2")
          ) {
            currentPart = 2;
            continue;
          } else if (
            lowerText.includes("phần i") ||
            lowerText.includes("phần 1")
          ) {
            currentPart = 1;
            continue;
          }

          // 1. Trường hợp dính liền Câu hỏi và Đáp án trên cùng 1 dòng
          const inlineMatch = text.trim().match(
            /^([Cc]âu\s*\d+[:.]\s*.*?)(A[.:)\/]\s*.*?)(B[.:)\/]\s*.*?)(C[.:)\/]\s*.*?)(D[.:)\/]\s*.*)$/,
          );
          if (inlineMatch && currentPart === 1) {
            currentQuestion = {
              id: newExamData.part1.length + 1,
              question: inlineMatch[1].trim(),
              options: [
                inlineMatch[2].trim(),
                inlineMatch[3].trim(),
                inlineMatch[4].trim(),
                inlineMatch[5].trim(),
              ],
              answer: 0,
            };

            const uTags = el.querySelectorAll(
              'u, strong, b, span[style*="color: red"]',
            );
            uTags.forEach((tag) => {
              const tagText = tag.textContent.trim();
              if (/^A[.:)\/]?/i.test(tagText) || tagText === "A")
                currentQuestion.answer = 0;
              if (/^B[.:)\/]?/i.test(tagText) || tagText === "B")
                currentQuestion.answer = 1;
              if (/^C[.:)\/]?/i.test(tagText) || tagText === "C")
                currentQuestion.answer = 2;
              if (/^D[.:)\/]?/i.test(tagText) || tagText === "D")
                currentQuestion.answer = 3;
            });

            newExamData.part1.push(currentQuestion);
            continue;
          }

          // 2. Nhận diện câu hỏi bình thường
          const isQuestion = /^câu\s*\d+[:.]/i.test(text.trim());
          if (isQuestion) {
            if (currentPart === 1) {
              currentQuestion = {
                id: newExamData.part1.length + 1,
                question: text,
                options: [],
                answer: 0,
              };
              newExamData.part1.push(currentQuestion);
            } else if (currentPart === 2) {
              currentQuestion = {
                id: newExamData.part2.length + 1,
                question: text,
                subQuestions: [],
              };
              newExamData.part2.push(currentQuestion);
            } else if (currentPart === 3) {
              currentQuestion = {
                id: newExamData.part3.length + 1,
                question: text,
                answer: "",
              };
              newExamData.part3.push(currentQuestion);
            }
            continue;
          }

          // 3. Nhận diện đáp án/lựa chọn
          if (currentQuestion) {
            if (currentPart === 1) {
              let isOptionLine = /^[A-D][.:)\/]/.test(text.trim());
              if (isOptionLine) {
                // Tách các lựa chọn nếu chúng nằm trên cùng 1 dòng
                const parts = text
                  .split(/(?=(?:^|\s)[A-D][.:)\/])/)
                  .filter((p) => p.trim());
                parts.forEach((part) => {
                  if (/^[A-D][.:)\/]/.test(part.trim())) {
                    currentQuestion.options.push(part.trim());
                  }
                });

                const uTags = el.querySelectorAll(
                  'u, strong, b, em, mark, span[style*="underline"], span[style*="bold"], span[style*="color: red"]',
                );
                if (uTags.length > 0) {
                  if (parts.length === 1) {
                    const optText = parts[0].trim();
                    if (/^A[.:)\/]/.test(optText)) currentQuestion.answer = 0;
                    if (/^B[.:)\/]/.test(optText)) currentQuestion.answer = 1;
                    if (/^C[.:)\/]/.test(optText)) currentQuestion.answer = 2;
                    if (/^D[.:)\/]/.test(optText)) currentQuestion.answer = 3;
                  } else {
                    uTags.forEach((tag) => {
                      const tagText = tag.textContent.trim();
                      if (!tagText) return;
                      parts.forEach((part, idx) => {
                        if (
                          part.includes(tagText) ||
                          tagText.includes(part.substring(0, 2))
                        ) {
                          if (/^A[.:)\/]/.test(part))
                            currentQuestion.answer = 0;
                          if (/^B[.:)\/]/.test(part))
                            currentQuestion.answer = 1;
                          if (/^C[.:)\/]/.test(part))
                            currentQuestion.answer = 2;
                          if (/^D[.:)\/]/.test(part))
                            currentQuestion.answer = 3;
                        }
                      });
                    });
                  }
                }
              } else if (currentQuestion.options.length === 0) {
                currentQuestion.question += "\n" + text;
              }
            } else if (currentPart === 2) {
              const isStatement = /^[a-e][.:)\/]/i.test(text.trim());
              if (isStatement) {
                let isTrue =
                  text.toLowerCase().includes("(đ)") ||
                  text.toLowerCase().endsWith("đ") ||
                  text.toLowerCase().includes("đúng");

                const uTags = Array.from(el.querySelectorAll('u, span[style*="underline"]')).filter(tag => tag.textContent.trim().length > 0);
                const boldTags = Array.from(el.querySelectorAll('strong, b, span[style*="bold"]')).filter(tag => tag.textContent.trim().length > 0);
                const redTags = Array.from(el.querySelectorAll('span[style*="color: red"], span[style*="color:#ff0000"]')).filter(tag => tag.textContent.trim().length > 0);
                
                if (uTags.length > 0 || boldTags.length > 0 || redTags.length > 0) {
                  isTrue = true;
                }

                const letterMatch = text.trim().match(/^([a-e])[.:)\/]\s*(.*)/i);
                const letter = letterMatch
                  ? letterMatch[1].toLowerCase()
                  : String.fromCharCode(
                      97 + currentQuestion.subQuestions.length,
                    );
                let cleanText = letterMatch ? letterMatch[2] : text;
                cleanText = cleanText
                  .replace(/\s*\([đs]\)\s*$/i, "")
                  .replace(/\s*(đúng|sai)\s*$/i, "");

                currentQuestion.subQuestions.push({
                  id: letter,
                  text: cleanText,
                  answer: isTrue,
                });
              } else if (currentQuestion.subQuestions.length === 0) {
                currentQuestion.question += "\n" + text;
              }
            } else if (currentPart === 3) {
              if (
                text.trim().toLowerCase().startsWith("đáp án:") ||
                text.trim().toLowerCase().startsWith("trả lời:")
              ) {
                currentQuestion.answer = text
                  .trim()
                  .replace(/^(đáp án|trả lời):\s*/i, "")
                  .trim();
              } else if (!currentQuestion.answer) {
                currentQuestion.question += "\n" + text;
              }
            }
          }
        }

        // Xử lý các câu hỏi thiếu options (có thể do format lạ)
        newExamData.part1.forEach((q) => {
          if (q.options.length === 0) {
            q.options = [
              "A. Đáp án A",
              "B. Đáp án B",
              "C. Đáp án C",
              "D. Đáp án D",
            ];
          }
        });

        // Fallback nếu không nhận diện được gì
        if (
          newExamData.part1.length === 0 &&
          newExamData.part2.length === 0 &&
          newExamData.part3.length === 0
        ) {
          newExamData.part1.push({
            id: 1,
            question:
              "Nội dung trích xuất từ file (Không đúng chuẩn định dạng):\n" +
              doc.body.textContent.substring(0, 300) +
              "...",
            options: [
              "A. Lựa chọn 1",
              "B. Lựa chọn 2",
              "C. Lựa chọn 3",
              "D. Lựa chọn 4",
            ],
            answer: 0,
          });
        }

        return newExamData;
      }

      function startExam() {
        const name = document.getElementById("studentName").value.trim();
        const className = document.getElementById("studentClass").value.trim();

        if (!name || !className) {
          showAlert("Vui lòng nhập đầy đủ Họ tên và Lớp!");
          return;
        }

        state.student.name = name;
        state.student.className = className;
        state.screen = "exam";
        state.timeLeft = 3600;

        state.timerInterval = setInterval(() => {
          state.timeLeft--;
          updateTimerDisplay();
          if (state.timeLeft <= 0) {
            clearInterval(state.timerInterval);
            submitExam();
          }
        }, 1000);

        render();
        window.scrollTo(0, 0);
      }

      function updateTimerDisplay() {
        const timerEl = document.getElementById("timer");
        if (timerEl) {
          const m = Math.floor(state.timeLeft / 60)
            .toString()
            .padStart(2, "0");
          const s = (state.timeLeft % 60).toString().padStart(2, "0");
          timerEl.innerText = `${m}:${s}`;

          if (state.timeLeft <= 300) {
            // 5 minutes left
            timerEl.classList.remove("text-blue-600");
            timerEl.classList.add("text-red-600", "animate-pulse");
          }
        }
      }

      function saveAnswer(part, qId, value, subId = null) {
        if (part === "part1" || part === "part3") {
          state.answers[part][qId] = value;
        } else if (part === "part2") {
          if (!state.answers.part2[qId]) state.answers.part2[qId] = {};
          state.answers.part2[qId][subId] = value;
        }
      }

              const sqText = sq.text.replace(/^[a-e][.:)\/]\s*/i, "");

              html += `
                          <div class="flex items-start gap-3 sm:gap-4 py-3 sm:py-4 border-b border-gray-100 last:border-0">
                              <div class="font-medium text-gray-800 w-5 pt-1.5 shrink-0">${sq.id})</div>
                              <div class="flex gap-2 shrink-0">
                                  <label class="relative cursor-pointer">
                                      <input type="radio" name="p2_q${q.id}_${sq.id}" value="true" ${isTrueChecked} onchange="saveAnswer('part2', ${q.id}, true, '${sq.id}')" class="peer sr-only">
                                      <div class="px-3 sm:px-4 py-1.5 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 peer-checked:bg-[#283553] peer-checked:text-white peer-checked:border-[#283553] transition-colors bg-white hover:bg-gray-50">Đúng</div>
                                  </label>
                                  <label class="relative cursor-pointer">
                                      <input type="radio" name="p2_q${q.id}_${sq.id}" value="false" ${isFalseChecked} onchange="saveAnswer('part2', ${q.id}, false, '${sq.id}')" class="peer sr-only">
                                      <div class="px-3 sm:px-4 py-1.5 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 peer-checked:bg-[#283553] peer-checked:text-white peer-checked:border-[#283553] transition-colors bg-white hover:bg-gray-50">Sai</div>
                                  </label>
                              </div>
                              <div class="text-gray-800 text-sm leading-relaxed pt-1.5 whitespace-pre-wrap">${sqText}</div>
                          </div>
                      `;
            });
            html += `</div></div>`;
          });
          html += `</div></div>`;
        }

        // Part 3
        if (state.examData.part3 && state.examData.part3.length > 0) {
          html += `
                  <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-200">
                      <div class="flex items-center mb-6 pb-4 border-b border-gray-100">
                          <div class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold mr-3">III</div>
                          <h2 class="text-xl font-bold text-gray-800">Câu trắc nghiệm trả lời ngắn <span class="text-sm font-normal text-gray-500 ml-2">(${p3Points} điểm)</span></h2>
                      </div>
                      <div class="space-y-6">
              `;

          state.examData.part3.forEach((q, index) => {
            if (!q) return;
            const cleanQuestion = q.question.replace(/^(Câu|Bài)\s*\d+[\s.:\-]+/i, "");
            const val = state.answers.part3[q.id] || "";
            html += `
                      <div class="question-block bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                          <div class="text-gray-800 mb-6 whitespace-pre-wrap text-base leading-relaxed font-medium"><span class="font-bold text-blue-600 mr-1">Câu ${q.id}:</span> ${cleanQuestion}</div>
                          <div class="flex items-center bg-gray-50 p-4 rounded-lg border border-gray-100">
                              <span class="text-gray-600 font-bold mr-3 shrink-0">Đáp án:</span>
                              <input type="text" value="${val}" oninput="saveAnswer('part3', ${q.id}, this.value)" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition font-medium text-gray-800 bg-white" placeholder="Nhập câu trả lời...">
                          </div>
                      </div>
                  `;
          });
          html += `</div></div>`;
        }

        // Submit button
        html += `
                    <div class="text-center pt-8 pb-12">
                        <button onclick="confirmSubmit()" class="bg-green-600 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex items-center justify-center mx-auto">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            HOÀN THÀNH VÀ NỘP BÀI
                        </button>
                    </div>
                </div>
            </div>`;

        return html;
      }

      function confirmSubmit() {
        showConfirm(
          "Bạn có chắc chắn muốn nộp bài không? Hãy kiểm tra lại các câu trả lời trước khi nộp.",
          () => {
            clearInterval(state.timerInterval);
            submitExam();
          },
        );
      }

      function submitExam() {
        let score = 0;
        let correctP1 = 0;
        let correctP2 = 0;
        let correctP3 = 0;
        let wrongAnswers = [];

        // Part 1
        state.examData.part1.forEach((q) => {
          if (state.answers.part1[q.id] === q.answer) {
            const p1Point = state.examData.examType === "3" ? 0.5 : 0.25;
            score += p1Point;
            correctP1++;
          } else {
            wrongAnswers.push({
              part: "Phần I",
              question: `Câu ${q.id}: ${q.question.replace(/^(Câu|Bài)\s*\d+[\s.:\-]+/i, "")}`,
              userAnswer:
                state.answers.part1[q.id] !== undefined
                  ? `${String.fromCharCode(65 + state.answers.part1[q.id])}. ${q.options[state.answers.part1[q.id]].replace(/^[A-D][.:)\/]\s*/, "")}`
                  : "Chưa trả lời",
              correctAnswer: `${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer].replace(/^[A-D][.:)\/]\s*/, "")}`,
            });
          }
        });

        // Part 2
        state.examData.part2.forEach((q) => {
          let correctCount = 0;
          q.subQuestions.forEach((sq) => {
            const userAns =
              state.answers.part2[q.id] && state.answers.part2[q.id][sq.id];
            if (userAns === sq.answer) {
              correctCount++;
              correctP2++;
            } else {
              wrongAnswers.push({
                part: "Phần II",
                question: `Câu ${q.id} - Ý ${sq.id}: ${sq.text.replace(/^[a-e][.:)\/]\s*/i, "")}`,
                userAnswer:
                  userAns !== undefined
                    ? userAns
                      ? "Đúng"
                      : "Sai"
                    : "Chưa trả lời",
                correctAnswer: sq.answer ? "Đúng" : "Sai",
              });
            }
          });

          if (correctCount === 1) score += 0.1;
          else if (correctCount === 2) score += 0.25;
          else if (correctCount === 3) score += 0.5;
          else if (correctCount === 4) score += 1.0;
        });

        // Part 3
        state.examData.part3.forEach((q) => {
          const userAns = (state.answers.part3[q.id] || "")
            .toString()
            .trim()
            .toLowerCase();
          const correctAns = q.answer.toString().trim().toLowerCase();
          if (userAns === correctAns) {
            score += 0.25;
            correctP3++;
          } else {
            wrongAnswers.push({
              part: "Phần III",
              question: `Câu ${q.id}: ${q.question.replace(/^(Câu|Bài)\s*\d+[\s.:\-]+/i, "")}`,
              userAnswer: state.answers.part3[q.id] || "Chưa trả lời",
              correctAnswer: q.answer,
            });
          }
        });

        state.score = score;
        state.results = { correctP1, correctP2, correctP3, wrongAnswers };

        // Save to Firestore
        const resultData = {
          examId: state.examId,
          name: state.student.name,
          className: state.student.className,
          score: parseFloat(score.toFixed(2)),
          correctP1,
          correctP2,
          correctP3,
          date: new Date().toISOString(),
          answers: state.answers,
          examType: state.examData.examType || "2"
        };
        
        try {
          window.addDoc(window.collection(window.db, "results"), resultData)
            .then(() => {
              console.log("Result saved successfully");
            })
            .catch((error) => {
              console.error("Error saving result:", error);
              showAlert("Có lỗi xảy ra khi lưu kết quả. Vui lòng báo cho giáo viên.");
            });
        } catch (error) {
          console.error("Error saving result:", error);
        }

        state.screen = "result";
        render();
        window.scrollTo(0, 0);
      }

      function renderResult() {
        const { correctP1, correctP2, correctP3, wrongAnswers } = state.results;

        let html = `
                <div class="min-h-screen bg-gray-50 py-12 px-4">
                    <div class="max-w-4xl mx-auto space-y-8">
                        <!-- Score Card -->
                        <div class="bg-white p-8 rounded-3xl shadow-xl text-center border border-gray-100 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-2 bg-blue-500"></div>
                            <h1 class="text-3xl font-bold text-gray-800 mb-2 mt-2">KẾT QUẢ BÀI THI</h1>
                            <div class="inline-flex items-center justify-center px-4 py-1.5 bg-gray-100 rounded-full mb-8">
                                <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                <span class="text-gray-700 font-medium">${state.student.name}</span>
                                <span class="mx-2 text-gray-300">|</span>
                                <span class="text-gray-700 font-medium">Lớp: ${state.student.className}</span>
                            </div>
                            
                            <div class="flex justify-center mb-10">
                                <div class="relative">
                                    <svg class="w-48 h-48 transform -rotate-90">
                                        <circle cx="96" cy="96" r="88" stroke="#f3f4f6" stroke-width="12" fill="none"></circle>
                                        <circle cx="96" cy="96" r="88" stroke="#3b82f6" stroke-width="12" fill="none" stroke-dasharray="552.92" stroke-dashoffset="${552.92 - (552.92 * state.score) / (state.examData.examType === "3" ? 20 : 10)}" stroke-linecap="round" class="transition-all duration-1000 ease-out"></circle>
                                    </svg>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                                        <span class="text-5xl font-black text-gray-800">${state.score.toFixed(2)}</span>
                                        <span class="text-sm font-bold text-gray-400 uppercase tracking-widest mt-1">/ ${state.examData.examType === "3" ? 20 : 10} Điểm</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-${(state.examData.part3 && state.examData.part3.length > 0) || state.examData.examType === "3" ? "3" : (state.examData.examType === "1" ? "2" : "3")} gap-6 text-center border-t border-gray-100 pt-8">
                                <div class="bg-blue-50 rounded-2xl p-4">
                                    <div class="text-sm text-blue-600 font-semibold mb-1 uppercase tracking-wider">Phần I</div>
                                    <div class="text-2xl font-bold text-gray-800">${correctP1}<span class="text-base font-medium text-gray-400">/${state.examData.part1.length}</span></div>
                                </div>
                                <div class="bg-green-50 rounded-2xl p-4">
                                    <div class="text-sm text-green-600 font-semibold mb-1 uppercase tracking-wider">Phần II</div>
                                    <div class="text-2xl font-bold text-gray-800">${correctP2}<span class="text-base font-medium text-gray-400">/${state.examData.part2.reduce((acc, q) => acc + q.subQuestions.length, 0)}</span></div>
                                </div>
                                ${state.examData.examType === "2" || (state.examData.part3 && state.examData.part3.length > 0) ? `
                                <div class="bg-purple-50 rounded-2xl p-4">
                                    <div class="text-sm text-purple-600 font-semibold mb-1 uppercase tracking-wider">Phần III</div>
                                    <div class="text-2xl font-bold text-gray-800">${correctP3}<span class="text-base font-medium text-gray-400">/${state.examData.part3.length}</span></div>
                                </div>
                                ` : (state.examData.examType === "3" ? `
                                <div class="bg-purple-50 rounded-2xl p-4">
                                    <div class="text-sm text-purple-600 font-semibold mb-1 uppercase tracking-wider">Phần III</div>
                                    <div class="text-2xl font-bold text-gray-800">0<span class="text-base font-medium text-gray-400">/0</span></div>
                                </div>
                                ` : '')}
                            </div>
                        </div>
            `;

        if (wrongAnswers.length > 0) {
          html += `
                        <!-- Wrong Answers Table -->
                        <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100">
                            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                                <div class="bg-red-100 p-2 rounded-lg mr-3">
                                    <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                </div>
                                Chi tiết các câu làm sai
                            </h2>
                            <div class="overflow-hidden rounded-xl border border-gray-200">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-gray-50 border-b border-gray-200">
                                            <th class="py-3 px-4 font-semibold text-gray-600 text-sm">Phần</th>
                                            <th class="py-3 px-4 font-semibold text-gray-600 text-sm">Câu hỏi</th>
                                            <th class="py-3 px-4 font-semibold text-red-600 text-sm">Bạn chọn</th>
                                            <th class="py-3 px-4 font-semibold text-green-600 text-sm">Đáp án đúng</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                `;
          wrongAnswers.forEach((wa) => {
            html += `
                                        <tr class="hover:bg-gray-50 transition">
                                            <td class="py-3 px-4 text-gray-500 text-sm font-medium">${wa.part}</td>
                                            <td class="py-3 px-4 text-gray-800 font-medium text-sm whitespace-pre-wrap">${wa.question}</td>
                                            <td class="py-3 px-4 text-red-500 font-medium text-sm line-through">${wa.userAnswer}</td>
                                            <td class="py-3 px-4 text-green-600 font-bold text-sm">${wa.correctAnswer}</td>
                                        </tr>
                    `;
          });
          html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                `;
        }

        html += `
                        <div class="text-center pt-4">
                            <button onclick="location.reload()" class="bg-gray-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-900 transition shadow-md hover:shadow-lg flex items-center justify-center mx-auto">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                LÀM LẠI BÀI THI
                            </button>
                        </div>
                    </div>
                </div>
            `;

        return html;
      }

      window.fetchAdminExams = fetchAdminExams;
      window.downloadDocx = downloadDocx;
      window.startExam = startExam;
      window.saveAnswer = saveAnswer;
      window.confirmSubmit = confirmSubmit;
      window.submitExam = submitExam;

      // Initialize app
      window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('examId');
        
        if (examId) {
          state.examId = examId;
          // Show loading
          const app = document.getElementById("app");
          app.innerHTML = `
            <div class="min-h-screen flex items-center justify-center bg-blue-50">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mx-auto mb-4"></div>
                    <p class="text-gray-600 font-medium">Đang tải bài thi...</p>
                </div>
            </div>
          `;
          
          try {
            const docRef = window.doc(window.db, "exams", examId);
            const docSnap = await window.getDoc(docRef);
            if (docSnap.exists()) {
              state.examData = JSON.parse(docSnap.data().data);
              setScreen('login');
            } else {
              showAlert("Không tìm thấy bài thi!");
              setScreen('role_selection');
            }
          } catch (error) {
            console.error("Error fetching exam:", error);
            showAlert("Lỗi khi tải bài thi.");
            setScreen('role_selection');
          }
        } else {
          render();
        }
      };
    </script>
  </body>
</html>
